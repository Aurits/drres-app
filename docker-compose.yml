version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-center-for-rapid-evidence-synthesis}/drres-frontend:latest
    build:
      context: ./frontend
    environment:
      - NODE_ENV=production
    ports:
      - "3000"
    restart: always

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-center-for-rapid-evidence-synthesis}/drres-backend:latest
    build:
      context: ./backend
    environment:
      - PORT=8000
    ports:
      - "8000"
    restart: always
